<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARZA PRO - Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Almarai', 'sans-serif'] },
                    colors: { primary: '#099999', primaryDark: '#067a7a', surface: '#f8fafc', surfaceDark: '#0f172a' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* تعديل لون الخط ليكون أسود داكن في خانات الإدخال */
        .input-field {
            @apply w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all shadow-inner text-black dark:text-white font-semibold;
        }

        .nav-btn { @apply text-gray-500 dark:text-gray-400 font-semibold; }
        .nav-btn:hover { @apply bg-gray-100 dark:bg-gray-700 text-primary; }
        .nav-btn.active { @apply bg-primary/10 text-primary border-r-4 border-primary rounded-r-none; }

        .kanban-list { min-height: 200px; }
        .kanban-card { 
            @apply bg-white dark:bg-gray-700 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-600 cursor-grab active:cursor-grabbing hover:shadow-md transition-all relative overflow-hidden;
        }
        .kanban-card.dragging { opacity: 0.5; transform: scale(0.95); border: 2px dashed #099999; }
        .drag-over { background-color: rgba(9, 153, 153, 0.1); border-radius: 1rem; border: 2px dashed #099999; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-action { @apply px-4 py-2 rounded-lg font-bold shadow transition-transform hover:scale-105 flex items-center gap-2 cursor-pointer; }
    </style>
</head>
<body class="bg-surface dark:bg-surfaceDark text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <div id="appContainer" class="flex h-screen overflow-hidden transition-opacity duration-500">
        
        <aside class="w-64 bg-white dark:bg-gray-800 shadow-xl flex flex-col justify-between transition-all duration-300">
            <div>
                <div class="p-6 flex items-center justify-between border-b dark:border-gray-700">
                    <h1 class="text-2xl font-extrabold text-primary tracking-wide">DARZA<span class="text-gray-500 dark:text-gray-400">PRO</span></h1>
                </div>
                <nav class="p-4 space-y-2">
                    <button class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all" data-target="tab-entry">
                        <i class="fas fa-plus-circle text-lg"></i> <span>إدخال طلب</span>
                    </button>
                    <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all" data-target="tab-manage">
                        <i class="fas fa-tasks text-lg"></i> <span>إدارة الطلبات</span>
                    </button>
                    <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all" data-target="tab-analytics">
                        <i class="fas fa-file-alt text-lg"></i> <span>التقارير</span>
                    </button>
                </nav>
            </div>
            <div class="p-4 border-t dark:border-gray-700 space-y-3">
                <div class="flex justify-between items-center px-2">
                    <button id="themeToggle" class="text-gray-500 hover:text-primary transition-colors"><i class="fas fa-moon text-xl"></i></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 relative">
            <div id="toastContainer" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

            <section id="tab-entry" class="tab-content active-tab fade-in">
                <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-3xl shadow-sm border dark:border-gray-700 p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-primary">إضافة طلبية جديدة</h2>
                    </div>
                    <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-3"><label class="block text-sm font-semibold mb-2">اسم مدخل الطلب</label><input type="text" id="entryUser" class="input-field" required></div>
                        <div><label class="block text-sm font-semibold mb-2">اسم الزبون</label><input type="text" id="custName" class="input-field" required autocomplete="off"></div>
                        <div><label class="block text-sm font-semibold mb-2">رقم الموبايل</label><input type="tel" id="custMob" class="input-field" required></div>
                        <div class="lg:col-span-1"><label class="block text-sm font-semibold mb-2">العنوان</label><input type="text" id="custAddr" class="input-field" required></div>
                        
                        <div><label class="block text-sm font-semibold mb-2">الموديل</label><input type="text" id="model" class="input-field" required></div>
                        <div><label class="block text-sm font-semibold mb-2">النمرة</label><input type="text" id="size" class="input-field" required></div>
                        <div><label class="block text-sm font-semibold mb-2">اسم الصفحة</label><input type="text" id="pageName" class="input-field" required></div>
                        
                        <div><label class="block text-sm font-semibold mb-2">الوزن (kg)</label><input type="number" id="weight" class="input-field" required></div>
                        <div><label class="block text-sm font-semibold mb-2">الطول (cm)</label><input type="number" id="height" class="input-field" required></div>
                        <div><label class="block text-sm font-semibold mb-2">السعر شامل التوصيل</label><div class="relative"><input type="number" id="price" class="input-field pl-10" required><span class="absolute left-3 top-3 text-gray-400">JOD</span></div></div>
                        
                        <div class="lg:col-span-3 mt-4">
                            <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white py-4 rounded-xl font-bold text-lg transition-transform hover:scale-[1.01] shadow-lg flex justify-center items-center gap-2">
                                <i class="fas fa-check-circle"></i> تأكيد وحفظ الطلبية
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="tab-manage" class="tab-content hidden fade-in h-full flex flex-col">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <div class="relative w-full md:w-96">
                        <i class="fas fa-search absolute right-4 top-3.5 text-gray-400"></i>
                        <input type="text" id="globalSearch" class="w-full pl-4 pr-10 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary outline-none shadow-sm" placeholder="ابحث بالاسم، الموبايل، أو السعر...">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportExcel()" class="btn-action bg-green-600 hover:bg-green-700 text-white"><i class="fas fa-file-excel"></i> تصدير Excel</button>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-hidden pb-4">
                    <div class="kanban-column bg-gray-50 dark:bg-gray-800/50 rounded-2xl p-4 flex flex-col border-t-4 border-yellow-400" data-status="new">
                        <div class="flex justify-between items-center mb-4 px-2">
                            <h3 class="font-bold text-lg"><i class="fas fa-inbox text-yellow-400"></i> طلبات جديدة</h3>
                            <span id="count-new" class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded-full text-xs font-bold">0</span>
                        </div>
                        <div id="list-new" class="kanban-list flex-1 overflow-y-auto space-y-3 p-1"></div>
                    </div>

                    <div class="kanban-column bg-gray-50 dark:bg-gray-800/50 rounded-2xl p-4 flex flex-col border-t-4 border-blue-400" data-status="process">
                        <div class="flex justify-between items-center mb-4 px-2">
                            <h3 class="font-bold text-lg"><i class="fas fa-cog fa-spin text-blue-400"></i> قيد التحضير</h3>
                            <span id="count-process" class="bg-blue-100 text-blue-800 px-2 py-1 rounded-full text-xs font-bold">0</span>
                        </div>
                        <div id="list-process" class="kanban-list flex-1 overflow-y-auto space-y-3 p-1"></div>
                    </div>

                    <div class="kanban-column bg-gray-50 dark:bg-gray-800/50 rounded-2xl p-4 flex flex-col border-t-4 border-green-500" data-status="done">
                        <div class="flex justify-between items-center mb-4 px-2">
                            <h3 class="font-bold text-lg"><i class="fas fa-check-double text-green-500"></i> جاهزة للتسليم</h3>
                            <span id="count-done" class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-bold">0</span>
                        </div>
                        <div id="list-done" class="kanban-list flex-1 overflow-y-auto space-y-3 p-1"></div>
                    </div>
                </div>
            </section>

            <section id="tab-analytics" class="tab-content hidden fade-in h-full flex flex-col overflow-y-auto pb-10">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border dark:border-gray-700 mb-6">
                    <h3 class="text-xl font-bold mb-4 text-primary"><i class="fas fa-filter"></i> فلاتر البحث المتقدم</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-4">
                        <div><label class="text-xs font-bold text-gray-500">اسم مدخل الطلب</label><input type="text" id="f-entryUser" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">اسم الزبون</label><input type="text" id="f-custName" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">رقم الموبايل</label><input type="text" id="f-custMob" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">العنوان</label><input type="text" id="f-custAddr" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">الموديل</label><input type="text" id="f-model" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">النمرة</label><input type="text" id="f-size" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">اسم الصفحة</label><input type="text" id="f-pageName" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">الوزن (kg)</label><input type="number" id="f-weight" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">الطول (cm)</label><input type="number" id="f-height" class="input-field py-2"></div>
                        <div><label class="text-xs font-bold text-gray-500">السعر</label><input type="number" id="f-price" class="input-field py-2"></div>
                    </div>
                    <button onclick="generateFilteredReport()" class="w-full bg-primary hover:bg-primaryDark text-white py-3 rounded-xl font-bold transition-all shadow">
                        <i class="fas fa-file-invoice"></i> إنشاء التقرير
                    </button>
                </div>

                <div id="reportContainer" class="hidden bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border dark:border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-gray-800 dark:text-white">التقرير التفصيلي</h3>
                        <span id="reportCount" class="bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-lg text-sm font-bold"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-right whitespace-nowrap">
                            <thead class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">
                                <tr>
                                    <th class="p-3">التاريخ</th>
                                    <th class="p-3">الزبون</th>
                                    <th class="p-3">الموبايل</th>
                                    <th class="p-3">الموديل / النمرة</th>
                                    <th class="p-3">الصفحة</th>
                                    <th class="p-3">المدخل</th>
                                    <th class="p-3">السعر</th>
                                    <th class="p-3">الحالة</th>
                                </tr>
                            </thead>
                            <tbody id="reportTableBody" class="divide-y dark:divide-gray-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="detailsModal" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-sm flex items-center justify-center transition-opacity">
        <div class="bg-white dark:bg-gray-800 w-full max-w-2xl rounded-3xl shadow-2xl transform scale-95 transition-transform" id="printArea">
            <div class="p-6 border-b dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-xl font-bold text-primary">تفاصيل الطلبية</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition text-2xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 grid grid-cols-2 gap-y-4 text-sm" id="modalBodyContent"></div>
            <div class="p-6 bg-gray-50 dark:bg-gray-900/50 rounded-b-3xl border-t dark:border-gray-700 flex flex-wrap justify-between items-center gap-4" data-html2canvas-ignore>
                <div class="flex gap-2">
                    <button onclick="downloadPDF()" class="btn-action bg-gray-800 text-white"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button id="waBtn" class="btn-action bg-green-500 text-white"><i class="fab fa-whatsapp"></i> واتساب</button>
                </div>
                <div id="modalActions" class="flex gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        // Global variables safely accessible by inline onclick
        window.allOrders = [];
        window.currentModalOrder = null;

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });
        if (localStorage.getItem('theme') === 'dark') themeToggle.click();

        // Tabs Logic
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                const target = e.currentTarget.getAttribute('data-target');
                e.currentTarget.classList.add('active');
                document.getElementById(target).classList.remove('hidden');
            });
        });

        // Search & Helpers
        function debounce(func, wait) { let timeout; return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); }; }
        document.getElementById('globalSearch').addEventListener('input', debounce(() => window.renderKanban(), 300));

        function showToast(msg, type='info') {
            const t = document.createElement('div');
            t.className = `px-6 py-3 rounded-xl shadow-lg text-white transform transition-all translate-y-[-100%] opacity-0 ${type==='error'?'bg-red-500':'bg-primary'}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.classList.remove('translate-y-[-100%]', 'opacity-0'), 10);
            setTimeout(() => { t.classList.add('opacity-0'); setTimeout(()=>t.remove(), 300); }, 3000);
        }

        // Window exposed functions for buttons
        window.closeModal = () => document.getElementById('detailsModal').classList.add('hidden');
        
        window.exportExcel = () => {
            if(window.allOrders.length === 0) return showToast('لا يوجد بيانات للتصدير', 'error');
            const ws = XLSX.utils.json_to_sheet(window.allOrders.map(o => ({
                "التاريخ": o.createdAt ? new Date(o.createdAt).toLocaleDateString('ar-EG') : '',
                "الزبون": o.custName, "الموبايل": o.custMob, "العنوان": o.custAddr, "الموديل": o.model, "النمرة": o.size, "الصفحة": o.pageName, "السعر": o.price, "المدخل": o.entryUser, "الحالة": o.status
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Orders");
            XLSX.writeFile(wb, "Darza_Orders.xlsx");
        };

        window.downloadPDF = () => {
            const el = document.getElementById('printArea');
            html2pdf().set({ margin: 1, filename: `Order_Details.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } }).from(el).save();
        };

        window.openDetails = (id) => {
            const o = window.allOrders.find(x => x.id === id);
            if(!o) return;
            window.currentModalOrder = o;
            
            document.getElementById('modalBodyContent').innerHTML = `
                <div class="col-span-2 bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg flex justify-between">
                    <span><strong>المدخل:</strong> ${o.entryUser}</span>
                    <span><strong>الصفحة:</strong> ${o.pageName}</span>
                </div>
                <div><strong class="block text-gray-500 mb-1">الزبون</strong> <div class="text-lg font-bold">${o.custName}</div></div>
                <div><strong class="block text-gray-500 mb-1">الموبايل</strong> <div dir="ltr" class="text-right text-lg">${o.custMob}</div></div>
                <div class="col-span-2"><strong class="block text-gray-500 mb-1">العنوان</strong> ${o.custAddr}</div>
                <div class="col-span-2 border-t dark:border-gray-600 my-2"></div>
                <div><strong class="block text-gray-500 mb-1">الموديل</strong> ${o.model}</div>
                <div><strong class="block text-gray-500 mb-1">النمرة</strong> ${o.size}</div>
                <div><strong class="block text-gray-500 mb-1">الوزن / الطول</strong> ${o.weight}kg / ${o.height}cm</div>
                <div class="col-span-2 bg-primary/10 p-4 rounded-xl mt-2 flex justify-between items-center border border-primary/20">
                    <span class="text-lg font-bold text-gray-700 dark:text-gray-200">المبلغ المطلوب تحصيله:</span>
                    <span class="text-2xl font-extrabold text-primary">${o.price} JOD</span>
                </div>
            `;

            document.getElementById('waBtn').onclick = () => {
                const text = encodeURIComponent(`مرحباً ${o.custName}، طلبك (مورد: ${o.model}) جاهز للتسليم بقيمة ${o.price} دينار.`);
                window.open(`https://wa.me/962${o.custMob.substring(1)}?text=${text}`, '_blank');
            };

            let actions = '';
            if (o.status === 'new') actions += `<button class="btn-action bg-blue-500 text-white" onclick="updateDBStatus('${id}', 'process')">بدء التحضير <i class="fas fa-cog"></i></button>`;
            if (o.status === 'process') actions += `<button class="btn-action bg-green-500 text-white" onclick="updateDBStatus('${id}', 'done')">إنهاء وتجهيز <i class="fas fa-check"></i></button>`;
            actions += `<button class="btn-action border border-red-500 text-red-500 hover:bg-red-500 hover:text-white" onclick="deleteDBOrder('${id}')"><i class="fas fa-trash"></i></button>`;
            
            document.getElementById('modalActions').innerHTML = actions;
            document.getElementById('detailsModal').classList.remove('hidden');
        };

        // UI function for generating the report
        window.generateFilteredReport = () => {
            const f = {
                entryUser: document.getElementById('f-entryUser').value.trim().toLowerCase(),
                custName: document.getElementById('f-custName').value.trim().toLowerCase(),
                custMob: document.getElementById('f-custMob').value.trim().toLowerCase(),
                custAddr: document.getElementById('f-custAddr').value.trim().toLowerCase(),
                model: document.getElementById('f-model').value.trim().toLowerCase(),
                size: document.getElementById('f-size').value.trim().toLowerCase(),
                pageName: document.getElementById('f-pageName').value.trim().toLowerCase(),
                weight: document.getElementById('f-weight').value,
                height: document.getElementById('f-height').value,
                price: document.getElementById('f-price').value
            };

            const results = window.allOrders.filter(o => {
                if(f.entryUser && !(o.entryUser||'').toLowerCase().includes(f.entryUser)) return false;
                if(f.custName && !(o.custName||'').toLowerCase().includes(f.custName)) return false;
                if(f.custMob && !(o.custMob||'').toLowerCase().includes(f.custMob)) return false;
                if(f.custAddr && !(o.custAddr||'').toLowerCase().includes(f.custAddr)) return false;
                if(f.model && !(o.model||'').toLowerCase().includes(f.model)) return false;
                if(f.size && !(o.size||'').toLowerCase().includes(f.size)) return false;
                if(f.pageName && !(o.pageName||'').toLowerCase().includes(f.pageName)) return false;
                if(f.weight && o.weight != f.weight) return false;
                if(f.height && o.height != f.height) return false;
                if(f.price && o.price != f.price) return false;
                return true;
            });

            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = '';
            
            const statusMap = { 'new': 'جديد', 'process': 'تحضير', 'done': 'جاهز' };
            const colorMap = { 'new': 'text-yellow-500', 'process': 'text-blue-500', 'done': 'text-green-500' };

            results.forEach(o => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer transition";
                tr.onclick = () => window.openDetails(o.id);
                tr.innerHTML = `
                    <td class="p-3">${o.createdAt ? new Date(o.createdAt).toLocaleDateString('ar-EG') : '-'}</td>
                    <td class="p-3 font-bold">${o.custName}</td>
                    <td class="p-3">${o.custMob}</td>
                    <td class="p-3">${o.model} / ${o.size}</td>
                    <td class="p-3">${o.pageName}</td>
                    <td class="p-3 text-gray-500">${o.entryUser}</td>
                    <td class="p-3 font-bold text-primary">${o.price} JOD</td>
                    <td class="p-3 font-bold ${colorMap[o.status] || ''}">${statusMap[o.status] || o.status}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('reportCount').textContent = `النتيجة: ${results.length} طلب`;
            document.getElementById('reportContainer').classList.remove('hidden');
        };

        window.renderKanban = () => {
            const term = document.getElementById('globalSearch').value.toLowerCase();
            const lists = { new: document.getElementById('list-new'), process: document.getElementById('list-process'), done: document.getElementById('list-done') };
            const counts = { new: 0, process: 0, done: 0 };
            
            Object.values(lists).forEach(el => el.innerHTML = '');

            window.allOrders.forEach(order => {
                if (term && !Object.values(order).join(' ').toLowerCase().includes(term)) return;
                if (!lists[order.status]) return;

                counts[order.status]++;
                const el = document.createElement('div');
                el.className = `kanban-card group`;
                el.draggable = true;
                el.dataset.id = order.id;
                
                const color = order.status === 'new' ? 'bg-yellow-400' : order.status === 'process' ? 'bg-blue-400' : 'bg-green-500';

                el.innerHTML = `
                    <div class="absolute right-0 top-0 bottom-0 w-1 ${color}"></div>
                    <div class="flex justify-between items-start mb-2 pr-2">
                        <strong class="text-lg">${order.custName}</strong>
                        <span class="text-primary font-bold bg-primary/10 px-2 py-1 rounded-md text-sm">${order.price} JOD</span>
                    </div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 space-y-1 pr-2">
                        <div><i class="fas fa-box text-xs w-4"></i> ${order.model} - ${order.size}</div>
                        <div><i class="fas fa-phone text-xs w-4"></i> ${order.custMob}</div>
                    </div>
                    <div class="mt-3 pt-3 border-t dark:border-gray-600 flex justify-between items-center opacity-0 group-hover:opacity-100 transition-opacity">
                         <span class="text-xs text-gray-400"><i class="fas fa-clock"></i> ${order.createdAt ? new Date(order.createdAt).toLocaleDateString('ar-EG') : 'الآن'}</span>
                         <button class="text-primary hover:text-primaryDark text-sm font-bold" onclick="window.openDetails('${order.id}')">التفاصيل <i class="fas fa-chevron-left"></i></button>
                    </div>
                `;

                el.addEventListener('dragstart', function() { window.draggedItem = this; setTimeout(() => this.classList.add('dragging'), 0); });
                el.addEventListener('dragend', function() { this.classList.remove('dragging'); window.draggedItem = null; });
                lists[order.status].appendChild(el);
            });

            document.getElementById('count-new').textContent = counts.new;
            document.getElementById('count-process').textContent = counts.process;
            document.getElementById('count-done').textContent = counts.done;
        };

        // Setup Drag & Drop zones
        document.querySelectorAll('.kanban-column').forEach(col => {
            col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
            col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
            col.addEventListener('drop', e => {
                e.preventDefault();
                col.classList.remove('drag-over');
                if(!window.draggedItem) return;
                const newStatus = col.dataset.status;
                const id = window.draggedItem.dataset.id;
                if(window.updateDBStatus) window.updateDBStatus(id, newStatus);
            });
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        // تم عزل قاعدة البيانات بـ try-catch لضمان عمل الأزرار حتى لو فشل الاتصال بقاعدة البيانات
        let db = null;
        let ordersCol = null;

        try {
            const app = initializeApp({
                apiKey: "AIzaSyBMjcGVXoEpSLQQIFY0uDCzq6QGju8j5PQ", 
                projectId: "darza-f1e08",
            });
            db = getFirestore(app);
            ordersCol = collection(db, 'orders');

            onSnapshot(query(ordersCol, orderBy('createdAt', 'desc')), (snapshot) => {
                window.allOrders = snapshot.docs.map(d => ({ 
                    id: d.id, 
                    ...d.data(),
                    createdAt: d.data().createdAt ? d.data().createdAt.toMillis() : Date.now()
                }));
                window.renderKanban();
            });
        } catch(err) {
            console.error("Firebase not configured correctly, using local memory.", err);
            // Fallback for demonstration if Firebase API key is fake
            if(window.allOrders.length === 0) window.renderKanban();
        }

        // Form Submission
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                entryUser: document.getElementById('entryUser').value,
                custName: document.getElementById('custName').value,
                custMob: document.getElementById('custMob').value,
                custAddr: document.getElementById('custAddr').value,
                model: document.getElementById('model').value,
                size: document.getElementById('size').value,
                pageName: document.getElementById('pageName').value,
                weight: Number(document.getElementById('weight').value),
                height: Number(document.getElementById('height').value),
                price: Number(document.getElementById('price').value),
                status: 'new',
                createdAt: new Date()
            };

            if(ordersCol) {
                try {
                    await addDoc(ordersCol, payload);
                    const t = document.createElement('div');
                    t.className = `px-6 py-3 rounded-xl shadow-lg text-white bg-primary fixed top-5 left-1/2 transform -translate-x-1/2 z-50`;
                    t.textContent = 'تم حفظ الطلبية بنجاح!';
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 3000);
                    document.getElementById('orderForm').reset();
                } catch(error) { console.error(error); }
            } else {
                // Local memory fallback
                payload.id = Math.random().toString(36).substring(7);
                payload.createdAt = Date.now();
                window.allOrders.unshift(payload);
                window.renderKanban();
                document.getElementById('orderForm').reset();
                alert("تم الحفظ في الذاكرة المؤقتة (تأكد من إعدادات Firebase)");
            }
        });

        // Expose DB update functions
        window.updateDBStatus = async (id, status) => {
            if(db) {
                await updateDoc(doc(db, 'orders', id), { status });
            } else {
                const o = window.allOrders.find(x=>x.id===id);
                if(o) o.status = status;
                window.renderKanban();
            }
            window.closeModal();
        };

        window.deleteDBOrder = async (id) => {
            if(!confirm('هل أنت متأكد من الحذف نهائياً؟')) return;
            if(db) {
                await deleteDoc(doc(db, 'orders', id));
            } else {
                window.allOrders = window.allOrders.filter(x=>x.id !== id);
                window.renderKanban();
            }
            window.closeModal();
        };
    </script>
</body>
