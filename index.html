<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام طلبات Darza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Almarai', sans-serif; background-color: #f0f7f7; padding-top: 20px; }
        .btn-main { background-color: #099999; color: white; border: none; font-weight: bold; }
        .btn-main:hover { background-color: #077a7a; color: white; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .order-new { border-right: 8px solid #ffc107; } /* أصفر للجديد */
        .order-done { border-right: 8px solid #28a745; opacity: 0.8; background-color: #f8f9fa; } /* أخضر للمنتهي */
        .section-title { color: #099999; font-weight: bold; border-bottom: 2px solid #099999; padding-bottom: 5px; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2 style="color: #099999; font-weight: bold;">Darza Orders System</h2>
        <p class="text-muted">نظام إدارة الطلبات اللحظي</p>
    </div>

    <div class="card p-4 mb-4">
        <div class="row g-2">
            <div class="col-md-5">
                <input type="text" id="custName" class="form-control" placeholder="اسم الزبون">
            </div>
            <div class="col-md-5">
                <input type="text" id="orderItem" class="form-control" placeholder="تفاصيل الطلبية">
            </div>
            <div class="col-md-2">
                <button onclick="sendOrder()" class="btn btn-main w-100">إرسال الطلب</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <h5 class="section-title">📦 طلبات جديدة</h5>
            <div id="newList"></div>
        </div>
        <div class="col-md-6">
            <h5 class="section-title">✅ طلبات جاهزة</h5>
            <div id="doneList"></div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBMjcGVXoEpSLQQIFY0uDCzq6QGju8j5PQ",
    authDomain: "darza-f1e08.firebaseapp.com",
    projectId: "darza-f1e08",
    storageBucket: "darza-f1e08.firebasestorage.app",
    messagingSenderId: "316947066983",
    appId: "1:316947066983:web:376e837ecb64e3357264c2",
    databaseURL: "https://darza-f1e08-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const ordersRef = ref(db, 'orders');

  window.sendOrder = function() {
    const name = document.getElementById('custName').value;
    const item = document.getElementById('orderItem').value;
    if(name && item) {
        push(ordersRef, { name, item, status: 'new' });
        document.getElementById('custName').value = '';
        document.getElementById('orderItem').value = '';
    }
  };

  window.changeStatus = function(id, newStatus) {
    update(ref(db, 'orders/' + id), { status: newStatus });
  };

  window.deleteOrder = function(id) {
    if(confirm("حذف الطلب نهائياً؟")) remove(ref(db, 'orders/' + id));
  };

  onValue(ordersRef, (snapshot) => {
    const data = snapshot.val();
    const newList = document.getElementById('newList');
    const doneList = document.getElementById('doneList');
    newList.innerHTML = ''; doneList.innerHTML = '';

    for (let id in data) {
        const order = data[id];
        const html = `
            <div class="card p-3 ${order.status === 'new' ? 'order-new' : 'order-done'}">
                <div class="d-flex justify-content-between align-items-center">
                    <div><strong>${order.name}</strong><br><small class="text-muted">${order.item}</small></div>
                    <div>
                        <button class="btn btn-sm ${order.status === 'new' ? 'btn-success' : 'btn-warning'}" 
                                onclick="changeStatus('${id}', '${order.status === 'new' ? 'done' : 'new'}')">
                            ${order.status === 'new' ? 'Done' : 'إرجاع'}
                        </button>
                        ${order.status === 'done' ? `<button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteOrder('${id}')">×</button>` : ''}
                    </div>
                </div>
            </div>`;
        if(order.status === 'new') newList.insertAdjacentHTML('afterbegin', html);
        else doneList.insertAdjacentHTML('afterbegin', html);
    }
  });
</script>
</body>
</html>
